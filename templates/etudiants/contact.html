{% extends 'etudiants/base.html' %}
{% block title %}Contact — PortfolioEtu{% endblock %}

{% block content %}
<div style="max-width:560px;margin:48px auto;padding:0 16px">
    <div class="card">
        <div class="card-title">
            <i class="ti ti-address-book" aria-hidden="true"></i>
            Contacter l'administrateur
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">
            <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-md)">
                <i class="ti ti-mail" style="font-size:20px;color:var(--info)" aria-hidden="true"></i>
                <div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:2px">Email</div>
                    <div style="font-size:14px;font-weight:500">admin@portfolioetu.cm</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-md)">
                <i class="ti ti-phone" style="font-size:20px;color:var(--success)" aria-hidden="true"></i>
                <div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:2px">Téléphone</div>
                    <div style="font-size:14px;font-weight:500">+237 6XX XXX XXX</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-md)">
                <i class="ti ti-clock" style="font-size:20px;color:var(--warning)" aria-hidden="true"></i>
                <div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:2px">Heures de validation</div>
                    <div style="font-size:14px;font-weight:500">Lundi – Vendredi, 8h – 17h</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
